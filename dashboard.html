<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>NXT CORE | Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      position: relative;
    }

    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.3;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(20,10,40,0.9) 100%);
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid rgba(138,43,226,0.3);
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .logo h2 {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #a855f7, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .user-card {
      background: rgba(138,43,226,0.15);
      border-radius: 20px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      backdrop-filter: blur(10px);
    }

    .user-avatar {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #8a2be2, #4b0082);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      color: white;
    }

    .user-info h3 {
      font-size: 16px;
      color: white;
    }

    .user-info p {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }

    .badge {
      background: rgba(168,85,247,0.2);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      color: #c084fc;
    }

    .logout-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      padding: 8px 15px;
      border-radius: 12px;
      color: #ff6b6b;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      background: rgba(255,107,107,0.2);
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 15px 25px;
      flex: 1;
      min-width: 120px;
      text-align: center;
      border: 1px solid rgba(138,43,226,0.2);
    }

    .stat-card i {
      font-size: 24px;
      color: #a855f7;
      margin-bottom: 8px;
    }

    .stat-card .number {
      font-size: 24px;
      font-weight: 700;
      color: white;
    }

    .stat-card .label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    .main-card {
      background: rgba(15,15,25,0.6);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 30px;
      border: 1px solid rgba(138,43,226,0.3);
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: white;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title i {
      color: #a855f7;
    }

    .input-field {
      width: 100%;
      padding: 14px 18px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(138,43,226,0.3);
      border-radius: 16px;
      color: white;
      font-size: 15px;
      margin-bottom: 20px;
    }

    .input-field:focus {
      outline: none;
      border-color: #a855f7;
    }

    select.input-field {
      cursor: pointer;
    }

    .send-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #8a2be2, #4b0082);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(138,43,226,0.5);
    }

    .history-container {
      max-height: 300px;
      overflow-y: auto;
    }

    .history-item {
      background: rgba(138,43,226,0.1);
      border-left: 3px solid #a855f7;
      padding: 12px 15px;
      margin-bottom: 10px;
      border-radius: 12px;
    }

    .history-number {
      font-weight: 600;
      color: white;
      font-size: 14px;
    }

    .history-bug {
      font-size: 12px;
      color: #c084fc;
      margin-top: 5px;
    }

    .history-time {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      margin-top: 5px;
    }

    .empty-history {
      text-align: center;
      padding: 40px;
      color: rgba(255,255,255,0.4);
    }

    .clear-btn {
      margin-top: 15px;
      padding: 10px;
      background: rgba(255,68,68,0.2);
      border: 1px solid #ff4444;
      border-radius: 12px;
      color: #ff6b6b;
      cursor: pointer;
      width: 100%;
      font-size: 13px;
    }

    .upgrade-card {
      background: linear-gradient(135deg, rgba(138,43,226,0.2), rgba(75,0,130,0.2));
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
      text-align: center;
    }

    .upgrade-card p {
      color: white;
      margin-bottom: 12px;
    }

    .upgrade-card a {
      color: #c084fc;
      text-decoration: none;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      border-left: 4px solid #8a2be2;
      padding: 12px 24px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1000;
      font-size: 13px;
      color: white;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1001;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: rgba(20,20,40,0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 30px;
      text-align: center;
      min-width: 280px;
    }

    .loading-bar {
      width: 100%;
      height: 6px;
      background: rgba(138,43,226,0.3);
      border-radius: 10px;
      margin: 20px 0;
      overflow: hidden;
    }

    .loading-progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #8a2be2, #c084fc);
      transition: width 0.3s;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        text-align: center;
      }
      .stats {
        flex-direction: column;
      }
      .main-card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <video class="bg-video" autoplay loop muted playsinline>
    <source src="https://files.catbox.moe/orsnsv.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <div class="container">
    <div class="header">
      <div class="logo">
        <h2>NXT CORE</h2>
      </div>
      <div class="user-card">
        <div class="user-avatar" id="userAvatar">Z</div>
        <div class="user-info">
          <h3 id="usernameDisplay">Loading...</h3>
          <p id="roleDisplay">Role: -</p>
          <p id="expiredDisplay">Exp: -</p>
        </div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <i class="fas fa-user-clock"></i>
        <div class="number" id="onlineCount">0</div>
        <div class="label">Online</div>
      </div>
      <div class="stat-card">
        <i class="fas fa-users"></i>
        <div class="number" id="connectionsCount">0</div>
        <div class="label">Connections</div>
      </div>
    </div>

    <div class="main-card">
      <div class="section-title">
        <i class="fas fa-bug"></i> MANAGE BUG SENDER
      </div>
      <input type="text" id="targetNumber" class="input-field" placeholder="NOMOR TARGET | Contoh: +62xxxxxxxxxx">
      <select id="bugType" class="input-field">
        <option value="CRASH WHATSAPP">CRASH WHATSAPP</option>
        <option value="FORCLOSE">FORCLOSE</option>
        <option value="DELAY INVISIBLE">DELAY INVISIBLE</option>
        <option value="DELAY HARD">DELAY HARD</option>
        <option value="ONE MSG FC">ONE MSG FC</option>
        <option value="CRASH BETA">CRASH BETA</option>
        <option value="BLANK">BLANK</option>
      </select>
      <button class="send-btn" onclick="sendBug()">
        <i class="fas fa-paper-plane"></i> SEND BUG ATTACK
      </button>
    </div>

    <div class="main-card">
      <div class="section-title">
        <i class="fas fa-history"></i> RIWAYAT BUG
      </div>
      <div id="historyContainer" class="history-container">
        <div class="empty-history">Belum ada riwayat</div>
      </div>
      <button class="clear-btn" onclick="clearHistory()">
        <i class="fas fa-trash-alt"></i> Hapus Riwayat
      </button>
    </div>

    <div class="upgrade-card">
      <p><i class="fas fa-gem"></i> Upgrade to the New NXT CORE</p>
      <a href="https://t.me/ZetsuTestimoni" target="_blank">Join NXT CORE Info Channel →</a>
    </div>
  </div>

  <div id="toast" style="display: none;"></div>
  <div id="loadingModal" class="modal">
    <div class="modal-content">
      <i class="fas fa-bug" style="font-size: 40px; color: #a855f7;"></i>
      <div class="loading-bar"><div class="loading-progress" id="loadingProgress"></div></div>
      <div id="loadingText" style="color: white;">Loading 0%</div>
    </div>
  </div>

  <script>
    const HISTORY_KEY = 'nxt_bug_history';

    function getHistory() {
      return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    }

    function saveHistory(history) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    function addToHistory(target, bug) {
      const history = getHistory();
      const now = new Date();
      const waktu = now.toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });
      history.unshift({ target, bug, waktu });
      if (history.length > 30) history.pop();
      saveHistory(history);
      renderHistory();
    }

    function renderHistory() {
      const container = document.getElementById('historyContainer');
      const history = getHistory();
      if (history.length === 0) {
        container.innerHTML = '<div class="empty-history"><i class="fas fa-inbox"></i> Belum ada riwayat</div>';
        return;
      }
      container.innerHTML = history.map(item => `
        <div class="history-item">
          <div class="history-number"><i class="fas fa-phone-alt"></i> ${escapeHtml(item.target)}</div>
          <div class="history-bug"><i class="fas fa-bug"></i> ${escapeHtml(item.bug)}</div>
          <div class="history-time"><i class="fas fa-clock"></i> ${escapeHtml(item.waktu)}</div>
        </div>
      `).join('');
    }

    function clearHistory() {
      if (confirm('Yakin hapus semua riwayat bug?')) {
        localStorage.removeItem(HISTORY_KEY);
        renderHistory();
        showToast("Riwayat berhasil dihapus!");
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
      toast.style.display = 'flex';
      toast.style.background = isError ? '#8B0000' : '#1a1a2e';
      setTimeout(() => toast.style.display = 'none', 3000);
    }

    function showLoading(target) {
      return new Promise((resolve) => {
        const modal = document.getElementById('loadingModal');
        const progressBar = document.getElementById('loadingProgress');
        const loadingText = document.getElementById('loadingText');
        modal.style.display = 'flex';
        const steps = [1, 3, 5, 6, 8, 10];
        let i = 0;
        function update() {
          if (i < steps.length) {
            progressBar.style.width = `${steps[i] * 10}%`;
            loadingText.textContent = `Loading ${steps[i]}-10%`;
            i++;
            setTimeout(update, 400);
          } else {
            loadingText.textContent = `Success Send Bug To ${target}`;
            progressBar.style.width = '100%';
            setTimeout(() => { modal.style.display = 'none'; resolve(); }, 1500);
          }
        }
        update();
      });
    }

    async function sendBug() {
      const target = document.getElementById('targetNumber').value.trim();
      const bug = document.getElementById('bugType').value;

      if (!target) {
        showToast("Ada kesalahan nih! Tolong Diisi Numbernya Ya Sengku", true);
        return;
      }

      const phoneRegex = /^[0-9+]+$/;
      if (!phoneRegex.test(target)) {
        showToast("Error! Isi Numbernya Dengan Angka Woii", true);
        return;
      }

      await showLoading(target);
      addToHistory(target, bug);
      showToast(`✅ Success Send Bug To ${target} | Bug: ${bug}`);
      document.getElementById('targetNumber').value = '';
    }

    function logout() {
      localStorage.removeItem('nxt_logged_in');
      localStorage.removeItem('nxt_user');
      localStorage.removeItem('nxt_role');
      localStorage.removeItem('nxt_expired');
      window.location.href = 'index.html';
    }

    function checkSession() {
      const loggedIn = localStorage.getItem('nxt_logged_in');
      const username = localStorage.getItem('nxt_user');
      const role = localStorage.getItem('nxt_role');
      const expired = localStorage.getItem('nxt_expired');

      if (!loggedIn || loggedIn !== 'true') {
        window.location.href = 'index.html';
        return;
      }

      document.getElementById('usernameDisplay').innerHTML = `Hi, ${username}`;
      document.getElementById('roleDisplay').innerHTML = `Role: ${role}`;
      document.getElementById('expiredDisplay').innerHTML = `Exp: ${expired || 'Lifetime'}`;
      document.getElementById('userAvatar').innerHTML = username.charAt(0).toUpperCase();
      document.getElementById('onlineCount').innerHTML = Math.floor(Math.random() * 50) + 10;
      document.getElementById('connectionsCount').innerHTML = Math.floor(Math.random() * 100) + 20;
    }

    checkSession();
    renderHistory();
  </script>
</body>
</html>
